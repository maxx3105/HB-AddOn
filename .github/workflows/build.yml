name: Build Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (z.B. 1.0)"
        required: true
        default: "1.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=$(date +%Y%m%d)-dev
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > src/addon/VERSION
          echo "Building version $VERSION"

      - name: Build tgz
        run: |
          cd src
          tar -czf ../hb-addon-${{ steps.version.outputs.VERSION }}.tgz rc.d addon update_script
          ls -lh ../hb-addon-*.tgz

      - name: Upload artifact (manual builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hb-addon-${{ steps.version.outputs.VERSION }}
          path: hb-addon-*.tgz
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: hb-addon-*.tgz
          generate_release_notes: true
          body: |
            ## HB-AddOn v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. OpenCCU WebUI → Einstellungen → Systemsteuerung → Zusatzsoftware
            2. `hb-addon-${{ steps.version.outputs.VERSION }}.tgz` hochladen
            3. Nach automatischem Neustart ist das Addon aktiv

            ### Unterstützte Geräte
            | Gerät | Modell-ID | Beschreibung |
            |-------|-----------|--------------|
            | HB-UNI-Sen-POOL-WP | 0xFC60 | Pool-Wärmepumpen-Controller |
