name: Build Addon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(date +%Y%m%d)-dev
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > src/addon/VERSION

      - name: Build tgz
        run: |
          cd src
          tar -czf ../hb-addon-${{ steps.version.outputs.VERSION }}.tgz rc.d addon update_script

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: hb-addon-dev
          path: hb-addon-*.tgz
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: hb-addon-*.tgz
          generate_release_notes: true
